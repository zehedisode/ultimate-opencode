name: validate
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all bash scripts syntax
        run: |
          for f in install.sh rollback.sh verify.sh scripts/*.sh; do
            [ -f "$f" ] && bash -n "$f" && echo "✅ $f" || { echo "❌ $f"; exit 1; }
          done
      - name: Check README exists
        run: test -f README.md
      - name: Count files
        run: |
          echo "Skills: $(ls skills/*.md 2>/dev/null | wc -l)"
          echo "Agents: $(find agents -name '*.md' 2>/dev/null | wc -l)"
          echo "Commands: $(ls commands/*.md 2>/dev/null | wc -l)"
          echo "Council: $(ls council/agents/*.md 2>/dev/null | wc -l)"
          echo "Scripts: $(ls scripts/*.sh 2>/dev/null | wc -l)"
      - name: Validate skill frontmatter
        run: |
          for f in skills/*.md; do
            if head -1 "$f" | grep -q '^---$'; then
              if head -5 "$f" | grep -q '^name:'; then
                :
              else
                echo "❌ $f missing 'name:' in frontmatter"
                exit 1
              fi
            else
              echo "❌ $f missing YAML frontmatter (---)"
              exit 1
            fi
          done
          echo "✅ All skills have valid frontmatter"
      - name: Validate agent frontmatter (name + subagent_type + model + tools)
        run: |
          for f in $(find agents -name '*.md'); do
            for field in name subagent_type model tools; do
              if ! head -10 "$f" | grep -q "^$field:"; then
                echo "❌ $f missing '$field' in frontmatter"
                exit 1
              fi
            done
          done
          echo "✅ All agents have complete frontmatter (name+subagent_type+model+tools)"
      - name: No 404 content check
        run: |
          FOUND=$(grep -rl "404: Not Found" skills/ agents/ commands/ 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "❌ Found '404: Not Found' in: $FOUND"
            exit 1
          fi
          echo "✅ No 404 content found"
      - name: All scripts are executable
        run: |
          for f in scripts/*.sh; do
            [ -x "$f" ] || { echo "❌ $f not executable"; exit 1; }
          done
          echo "✅ All scripts executable"
      - name: Validate JSON config
        run: python3 -c "import json; json.load(open('config/opencode.json'))" && echo "✅ JSON valid"
      - name: Validate JSONC config
        run: |
          python3 -c "
import re, json
with open('config/opencode.jsonc') as f:
    content = re.sub(r'//.*', '', f.read())
    json.loads(content)
          " && echo "✅ JSONC valid"
      - name: CHAMBER script dry-run
        run: bash scripts/chamber.sh --help 2>&1 | grep -q "CHAMBER" && echo "✅ CHAMBER help OK"
      - name: ECHO script dry-run
        run: bash scripts/echo.sh --help 2>&1 | grep -q "ECHO" && echo "✅ ECHO help OK"
      - name: PRISM script dry-run
        run: bash scripts/prism.sh --help 2>&1 | grep -q "PRISM" && echo "✅ PRISM help OK"
